name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Proxy unit tests
        run: npm run test:run -w packages/proxy

      - name: Typecheck proxy
        run: npm run typecheck -w packages/proxy

      - name: Typecheck web
        run: npm run typecheck -w apps/web

      - name: Typecheck CLI
        run: npm run typecheck -w packages/cli

      - name: Lint web
        run: npm run lint -w apps/web

      - name: Web unit tests
        run: npm run test:run -w apps/web

      - name: Build verify
        run: npm run build

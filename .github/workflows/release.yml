name: Release
on:
  push:
    tags: ["v*"]

# Grant write access to releases
permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install system deps
        run: |
          brew install protobuf

      - name: Install npm deps
        run: npm ci

      - name: Run tests
        run: |
          npm run test:run -w packages/proxy
          npm run typecheck -w packages/proxy
          npm run typecheck -w apps/web
          npm run typecheck -w packages/cli
          npm run lint -w apps/web
          npm run test:run -w apps/web

      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Generate updater manifest
        run: |
          SIG=$(cat src-tauri/target/release/bundle/macos/ClaudeCode\ Proxy.app.tar.gz.sig)
          VERSION="${GITHUB_REF_NAME#v}"
          cat > src-tauri/target/release/bundle/macos/latest.json << EOF
          {
            "version": "$VERSION",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ClaudeCode.Proxy.app.tar.gz",
            "signature": "$SIG"
          }
          EOF

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
            src-tauri/target/release/bundle/macos/latest.json
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
